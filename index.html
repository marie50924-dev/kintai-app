<title>勤怠管理システム</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;background:#eff6ff;color:#0f172a;font-size:15px;-webkit-text-size-adjust:100%}
body{padding-bottom:env(safe-area-inset-bottom)}
button{font-family:inherit}
input,select,textarea{font-family:inherit;font-size:16px}

#loading-screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#eff6ff;z-index:9999}
#loading-screen .clock{font-size:64px;margin-bottom:16px}
#loading-screen .text{color:#2563eb;font-weight:bold;font-size:18px}

#error-screen{position:fixed;inset:0;background:white;padding:24px;z-index:9998;display:none;flex-direction:column;overflow:auto}
#error-screen.show{display:flex}
#error-screen h2{color:#dc2626;margin-top:0}
#error-screen pre{background:#fee;padding:12px;border-radius:8px;font-size:11px;overflow:auto;max-height:300px;white-space:pre-wrap;word-break:break-word}

.app-header{background:linear-gradient(120deg,#1e40af 0%,#2563eb 55%,#0891b2 100%);color:white;padding:14px 16px;display:flex;align-items:center;gap:12px;padding-top:calc(14px + env(safe-area-inset-top))}
.app-header .logo{width:44px;height:44px;background:rgba(255,255,255,0.2);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.app-header .title{flex:1;min-width:0}
.app-header .title h1{margin:0;font-size:17px;font-weight:700;line-height:1.2}
.app-header .title p{margin:2px 0 0;font-size:11px;opacity:0.85;letter-spacing:0.5px}
.app-header .badge{background:rgba(255,255,255,0.22);padding:7px 12px;border-radius:999px;font-size:12px;font-weight:600;white-space:nowrap}

.tabs{background:white;display:flex;border-bottom:1px solid #e2e8f0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tabs button{flex:1;min-width:75px;background:none;border:none;padding:12px 6px;font-size:13px;color:#64748b;cursor:pointer;font-weight:500;border-bottom:2px solid transparent;display:flex;align-items:center;justify-content:center;gap:4px}
.tabs button.active{color:#2563eb;border-bottom-color:#2563eb;font-weight:700}
.tabs button .ic{font-size:15px}
.tabs button .lock{font-size:11px;opacity:0.5}

.screen{padding:14px;max-width:600px;margin:0 auto}

.card{background:white;border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(15,23,42,0.06)}
.card.hero{background:linear-gradient(120deg,#1e40af 0%,#2563eb 55%,#0891b2 100%);color:white;text-align:center;padding:24px 16px}
.card.hero .date{font-size:14px;opacity:0.95;margin-bottom:8px}
.card.hero .time{font-size:42px;font-weight:800;letter-spacing:1px;font-variant-numeric:tabular-nums}

.btn{display:block;width:100%;padding:14px;font-size:16px;font-weight:700;border:none;border-radius:10px;background:#2563eb;color:white;cursor:pointer;margin-bottom:10px}
.btn:active{opacity:0.7}
.btn:disabled{background:#cbd5e1;color:#94a3b8}
.btn.secondary{background:#64748b}
.btn.success{background:#16a34a}
.btn.warning{background:#f59e0b}
.btn.danger{background:#dc2626}
.btn.outline{background:white;color:#2563eb;border:1.5px solid #2563eb}
.btn.outline.danger{color:#dc2626;border-color:#dc2626}
.btn.small{padding:8px 12px;font-size:13px;margin:0;display:inline-block;width:auto;border-radius:8px}

.btn-row{display:flex;gap:8px}
.btn-row .btn{flex:1}

.field{margin-bottom:12px}
.field label{display:block;font-size:13px;color:#475569;margin-bottom:6px;font-weight:600}
.field label .req{color:#dc2626;margin-left:2px}
.input,.select,.textarea{width:100%;padding:12px;border:1.5px solid #e2e8f0;border-radius:10px;background:white;color:#0f172a}
.input:focus,.select:focus,.textarea:focus{outline:none;border-color:#2563eb}
.textarea{resize:vertical;min-height:80px}
.helper{font-size:12px;color:#64748b;margin-top:4px;background:#f1f5f9;padding:8px 12px;border-radius:8px}

.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.status{text-align:center;padding:14px;border-radius:12px;margin-bottom:14px;font-weight:700;font-size:16px}
.status.not_started{background:#f1f5f9;color:#64748b}
.status.working{background:#dcfce7;color:#15803d}
.status.on_break{background:#fef3c7;color:#b45309}
.status.finished{background:#dbeafe;color:#1d4ed8}

.emp-row{display:flex;align-items:center;gap:12px}
.emp-avatar{width:44px;height:44px;border-radius:50%;background:#2563eb;color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0}
.emp-info{flex:1;min-width:0}
.emp-info .name{font-weight:700;font-size:15px}
.emp-info .sub{font-size:12px;color:#64748b;margin-top:2px}
.emp-actions{display:flex;gap:6px;flex-shrink:0}

.hist-card{background:white;border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(15,23,42,0.06)}

.hist-head .right{margin-left:auto;display:flex;align-items:center;gap:6px}
.pill{padding:5px 10px;border-radius:999px;font-size:12px;font-weight:700;font-variant-numeric:tabular-nums}
.pill.green{background:#dcfce7;color:#15803d}
.pill.gray{background:#f1f5f9;color:#64748b}
.times{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.times .col .lbl{font-size:11px;color:#64748b;margin-bottom:2px}
.times .col .val{font-size:17px;font-weight:700;font-variant-numeric:tabular-nums}
.correction{margin-top:10px;color:#c2410c;font-size:12px;font-weight:600}

.filter-row{display:flex;gap:8px;margin-bottom:12px}
.filter-row .select{flex:1}

.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-card{background:white;border-radius:14px;padding:16px;text-align:center;box-shadow:0 1px 3px rgba(15,23,42,0.06)}
.stat-card .lbl{font-size:12px;color:#64748b;margin-bottom:6px}
.stat-card .val{font-size:30px;font-weight:800;font-variant-numeric:tabular-nums}
.stat-card .val.blue{color:#2563eb}
.stat-card .val.green{color:#16a34a}
.stat-card .unit{font-size:12px;color:#64748b;margin-top:4px}

.empty{text-align:center;color:#94a3b8;padding:30px 16px;font-size:14px}

.pay-table{width:100%;border-collapse:collapse;margin-top:10px;font-size:14px}
.pay-table td{padding:8px 4px;border-bottom:1px solid #f1f5f9}
.pay-table tr:last-child td{border-bottom:none}
.pay-table tr.total td{font-weight:700;font-size:16px;border-top:2px solid #e2e8f0;padding-top:12px}
.pay-table tr.tax td{color:#dc2626}
.pay-table .num{text-align:right;font-variant-numeric:tabular-nums}

.modal-backdrop{position:fixed;inset:0;background:rgba(15,23,42,0.5);z-index:1000;display:flex;align-items:flex-end;justify-content:center}
.modal{background:white;border-radius:18px 18px 0 0;padding:20px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;padding-bottom:calc(20px + env(safe-area-inset-bottom))}
.modal h2{margin:0 0 4px;font-size:18px}
.modal .modal-sub{font-size:13px;color:#64748b;margin-bottom:16px}

.lock-screen{padding:30px 14px;text-align:center}
.lock-screen .icon{font-size:48px;margin-bottom:12px}
.lock-screen h2{margin:0 0 8px;font-size:18px}
.lock-screen p{color:#64748b;font-size:13px;margin:0 0 20px}
.lock-screen .input{max-width:200px;margin:0 auto 12px;text-align:center;font-size:24px;letter-spacing:8px}
.lock-screen .btn{max-width:200px;margin:0 auto}
</style>

<body>

<div id="loading-screen">
<div class="clock">⏱</div>
<div class="text">読み込み中…</div>
</div>

<div id="error-screen">
<h2>⚠ エラー</h2>
<p>アプリの起動に失敗しました。下のメッセージをスクショして相談してください。</p>
<pre id="error-message"></pre>
<button onclick="location.reload()" class="btn">再読み込み</button>
</div>

<div id="root"></div>

<script>
function showError(msg){
  var ls=document.getElementById('loading-screen');if(ls)ls.style.display='none';
  var es=document.getElementById('error-screen');if(es)es.classList.add('show');
  var em=document.getElementById('error-message');if(em)em.textContent=msg;
}
window.addEventListener('error',function(e){
  var msg=(e.message||'')+'\n'+(e.filename||'')+':'+(e.lineno||'');
  if(e.error&&e.error.stack)msg+='\n'+e.error.stack;
  showError(msg);
});
window.addEventListener('unhandledrejection',function(e){
  var msg='Promise rejected: '+(e.reason&&e.reason.message?e.reason.message:String(e.reason));
  if(e.reason&&e.reason.stack)msg+='\n'+e.reason.stack;
  showError(msg);
});
setTimeout(function(){
  var ls=document.getElementById('loading-screen');
  if(ls&&ls.style.display!=='none'&&(typeof React==='undefined'||typeof firebase==='undefined')){
    showError('ライブラリの読み込みに失敗しました。ネットワークを確認してください。\nReact: '+(typeof React)+'\nFirebase: '+(typeof firebase));
  }
},12000);
</script>

<script type="text/babel" data-presets="env,react">
'use strict';

function pad2(n){ return String(n).padStart(2,'0'); }
function formatDate(d){ d=d||new Date(); return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate()); }
function formatMonth(d){ d=d||new Date(); return d.getFullYear()+'-'+pad2(d.getMonth()+1); }
function formatTime(iso){ if(!iso) return '--:--'; const d=new Date(iso); return pad2(d.getHours())+':'+pad2(d.getMinutes()); }
function nowISO(){ return new Date().toISOString(); }
function genId(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
function todayJP(){
  const d = new Date();
  const w = ['日','月','火','水','木','金','土'][d.getDay()];
  return d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日('+w+')';
}
function dateJP(yyyymmdd){
  const parts = yyyymmdd.split('-');
  if(parts.length !== 3) return yyyymmdd;
  const d = new Date(parseInt(parts[0],10), parseInt(parts[1],10)-1, parseInt(parts[2],10));
  const w = ['日','月','火','水','木','金','土'][d.getDay()];
  return parseInt(parts[1],10)+'/'+parseInt(parts[2],10)+'('+w+')';
}
function getInitials(name){
  if(!name) return '?';
  return name.trim().slice(0,1);
}

function calcBreakMin(rec){
  if(!rec) return 0;
  if(rec.breakMinutes != null) return rec.breakMinutes;
  if(!rec.breaks || !rec.breaks.length) return 0;
  let total = 0;
  for(let i=0;i<rec.breaks.length;i++){
    const b = rec.breaks[i];
    if(b.start && b.end){
      total += (new Date(b.end).getTime() - new Date(b.start).getTime())/60000;
    }
  }
  return Math.floor(total);
}

function calcWorkMinutes(rec){
  if(!rec || !rec.clockIn || !rec.clockOut) return 0;
  const total = (new Date(rec.clockOut).getTime() - new Date(rec.clockIn).getTime()) / 60000;
  return Math.max(0, Math.floor(total - calcBreakMin(rec)));
}

function minutesToHM(min){
  const h = Math.floor(min/60);
  const m = min%60;
  return h+':'+pad2(m);
}

function getRecordStatus(rec){
  if(!rec || !rec.clockIn) return 'not_started';
  if(rec.clockOut) return 'finished';
  if(rec.breaks && rec.breaks.length>0 && !rec.breaks[rec.breaks.length-1].end) return 'on_break';
  return 'working';
}

function statusLabel(s){
  return { not_started:'未出勤', working:'勤務中', on_break:'休憩中', finished:'勤務終了' }[s] || s;
}

// 令和8年 月額表 甲欄 電算機計算特例（社保控除0、要再検証）
function calcIncomeTax(gross, dependents){
  const A = Math.floor(gross);
  const dep = Math.max(0, Math.min(7, dependents||0));
  const exemptionLine = 88000 + dep * 31667;
  if(A < exemptionLine) return 0;
  let baseTax = 0;
  if(A < 162500)        baseTax = (A * 0.06126 - 1560);
  else if(A < 275000)   baseTax = (A * 0.07143 - 3213);
  else if(A < 579167)   baseTax = (A * 0.08163 - 6066);
  else if(A < 750000)   baseTax = (A * 0.11408 - 25793);
  else if(A < 1500000)  baseTax = (A * 0.20530 - 109280);
  else if(A < 3500000)  baseTax = (A * 0.23693 - 156776);
  else if(A < 7000000)  baseTax = (A * 0.40840 - 757071);
  else                  baseTax = (A * 0.45945 - 1115672);
  baseTax -= dep * 1610;
  const tax = baseTax * 1.0021;
  return Math.floor(Math.max(0, tax));
}

function calcPayroll(employee, totalMinutes){
  if(!employee) return { gross:0, tax:0, net:0, hours:0, mode:'none' };
  const hours = totalMinutes / 60;
  let gross = 0;
  let mode = 'none';
  if(employee.baseSalary && employee.baseSalary > 0){
    gross = Math.floor(employee.baseSalary);
    mode = 'monthly';
  } else if(employee.hourlyRate && employee.hourlyRate > 0){
    gross = Math.floor(employee.hourlyRate * hours);
    mode = 'hourly';
  }
  const tax = calcIncomeTax(gross, employee.dependents || 0);
  return { gross:gross, tax:tax, net:gross-tax, hours:hours, mode:mode };
}

const INITIAL_STATE = { employees: [], records: [] };

function reducer(state, action){
  switch(action.type){
    case 'ADD_EMPLOYEE':
      return Object.assign({}, state, { employees: state.employees.concat([action.employee]) });
    case 'UPDATE_EMPLOYEE':
      return Object.assign({}, state, {
        employees: state.employees.map(function(e){ return e.id===action.employee.id ? action.employee : e; })
      });
    case 'DELETE_EMPLOYEE':
      return Object.assign({}, state, {
        employees: state.employees.filter(function(e){ return e.id !== action.id; }),
        records:   state.records.filter(function(r){ return r.employeeId !== action.id; })
      });
    case 'ADD_RECORD':
      return Object.assign({}, state, { records: state.records.concat([action.record]) });
    case 'UPDATE_RECORD':
      return Object.assign({}, state, {
        records: state.records.map(function(r){ return r.id===action.record.id ? action.record : r; })
      });
    case 'DELETE_RECORD':
      return Object.assign({}, state, { records: state.records.filter(function(r){ return r.id !== action.id; }) });
    default:
      return state;
  }
}

function TabNav({ tab, onChange, isAdmin }){

    { id:'punch',     label:'打刻', icon:'⏱', lock:false },
    { id:'history',   label:'履歴', icon:'☑', lock:true },

function LockScreen({ onUnlock }){
  const [pwd, setPwd] = useState('');
  function tryUnlock(){
    if(pwd === ADMIN_PASSWORD){ onUnlock(); }
    else { alert('パスワードが違います'); setPwd(''); }
  }
  return (
    <div className="lock-screen">
      <div className="icon">🔒</div>

      <p>このタブを開くにはパスワードが必要です</p>
      <input type="password" inputMode="numeric" className="input" value={pwd}
        onChange={function(e){ setPwd(e.target.value); }} placeholder="****" />
      <button className="btn" onClick={tryUnlock}>解除</button>
    </div>

}

function PunchScreen({ state, dispatch }){
  const [now, setNow] = useState(new Date());
  const [currentId, setCurrentId] = useState('');

  useEffect(function(){
    const t = setInterval(function(){ setNow(new Date()); }, 1000);
    return function(){ clearInterval(t); };
  }, []);

  useEffect(function(){
    if(!currentId && state.employees.length > 0){
      setCurrentId(state.employees[0].id);
    }
  }, [state.employees, currentId]);

  const today = formatDate();
  const todayRec = state.records.find(function(r){ return r.employeeId===currentId && r.date===today; });
  const status = getRecordStatus(todayRec);
  const currentEmp = state.employees.find(function(e){ return e.id===currentId; });

  function clockIn(){
    dispatch({ type:'ADD_RECORD', record:{
      id:genId(), employeeId:currentId, date:today,
      clockIn:nowISO(), clockOut:null, breaks:[], breakMinutes:null,
      isEdited:false, correctionReason:null, note:''
    }});
  }
  function clockOut(){
    if(!todayRec) return;
    const breaks = (todayRec.breaks || []).slice();
    if(breaks.length>0 && !breaks[breaks.length-1].end){
      breaks[breaks.length-1] = Object.assign({}, breaks[breaks.length-1], { end:nowISO() });
    }
    dispatch({ type:'UPDATE_RECORD', record:Object.assign({}, todayRec, { clockOut:nowISO(), breaks:breaks }) });
  }
  function breakStart(){
    if(!todayRec) return;
    const breaks = (todayRec.breaks || []).slice();
    breaks.push({ start:nowISO(), end:null });
    dispatch({ type:'UPDATE_RECORD', record:Object.assign({}, todayRec, { breaks:breaks }) });
  }
  function breakEnd(){
    if(!todayRec) return;
    const breaks = (todayRec.breaks || []).slice();
    if(breaks.length>0 && !breaks[breaks.length-1].end){
      breaks[breaks.length-1] = Object.assign({}, breaks[breaks.length-1], { end:nowISO() });
    }
    dispatch({ type:'UPDATE_RECORD', record:Object.assign({}, todayRec, { breaks:breaks }) });
  }

  return (
    <div className="screen">
      <div className="card hero">
        <div className="date">{todayJP()}</div>
        <div className="time">{pad2(now.getHours())}:{pad2(now.getMinutes())}:{pad2(now.getSeconds())}</div>
      </div>

      <div className="card">
        <div className="field" style={{marginBottom:0}}>
          <label>社員を選択</label>
          {state.employees.length === 0 ? (
            <div className="empty" style={{padding:'12px 0'}}>「社員」タブで社員を追加してください</div>
          ) : (
            <select className="select" value={currentId} onChange={function(e){ setCurrentId(e.target.value); }}>
              {state.employees.map(function(emp){
                return <option key={emp.id} value={emp.id}>{emp.name}</option>;
              })}
            </select>
          )}
        </div>
      </div>

      {currentEmp ? (
        <React.Fragment>
          <div className={'status '+status}>{statusLabel(status)}</div>

          <div className="card">
            <div className="times">
              <div className="col">
                <div className="lbl">出勤</div>
                <div className="val">{formatTime(todayRec && todayRec.clockIn)}</div>
              </div>
              <div className="col">
                <div className="lbl">退勤</div>
                <div className="val">{formatTime(todayRec && todayRec.clockOut)}</div>
              </div>
              <div className="col">
                <div className="lbl">休憩</div>
                <div className="val">{todayRec ? minutesToHM(calcBreakMin(todayRec)) : '0:00'}</div>
              </div>
            </div>
            {status === 'finished' ? (
              <div style={{marginTop:14,textAlign:'center',padding:'10px',background:'#dbeafe',borderRadius:10}}>
                <div style={{fontSize:11,color:'#64748b'}}>勤務時間</div>
                <div style={{fontSize:24,fontWeight:800,color:'#1d4ed8'}}>{minutesToHM(calcWorkMinutes(todayRec))}</div>
              </div>
            ) : null}
          </div>

          <button className="btn success" disabled={status !== 'not_started'} onClick={clockIn}>出勤</button>
          <button className="btn warning" disabled={status !== 'working'} onClick={breakStart}>休憩開始</button>
          <button className="btn warning" disabled={status !== 'on_break'} onClick={breakEnd}>休憩終了</button>
          <button className="btn danger" disabled={status === 'not_started' || status === 'finished'} onClick={clockOut}>退勤</button>
        </React.Fragment>
      ) : null}
    </div>
  );
}

function PastEntryModal({ employees, editRecord, onSave, onCancel }){
  function toTimeStr(iso){
    const d = new Date(iso);
    return pad2(d.getHours())+':'+pad2(d.getMinutes());
  }
  const initialEmp = editRecord ? editRecord.employeeId : (employees[0] ? employees[0].id : '');
  const initialDate = editRecord ? editRecord.date : formatDate();
  const initialIn = editRecord && editRecord.clockIn ? toTimeStr(editRecord.clockIn) : '09:00';
  const initialOut = editRecord && editRecord.clockOut ? toTimeStr(editRecord.clockOut) : '18:00';
  const initialBreak = editRecord ? calcBreakMin(editRecord) : 60;

  const [employeeId, setEmployeeId] = useState(initialEmp);
  const [date, setDate] = useState(initialDate);
  const [clockInT, setClockInT] = useState(initialIn);
  const [clockOutT, setClockOutT] = useState(initialOut);
  const [breakMin, setBreakMin] = useState(String(initialBreak));
  const [note, setNote] = useState(editRecord ? (editRecord.note||'') : '');
  const [reason, setReason] = useState(editRecord ? (editRecord.correctionReason||'') : '');

  function combineDateTime(dateStr, timeStr){
    if(!dateStr || !timeStr) return null;
    const parts = timeStr.split(':');
    if(parts.length<2) return null;
    const d = new Date(dateStr+'T'+pad2(parseInt(parts[0],10))+':'+pad2(parseInt(parts[1],10))+':00');
    return d.toISOString();
  }

  function save(){
    if(!employeeId){ alert('社員を選択してください'); return; }
    if(!reason.trim()){ alert('訂正理由は必須です'); return; }
    const clockInISO = combineDateTime(date, clockInT);
    const clockOutISO = combineDateTime(date, clockOutT);
    if(!clockInISO || !clockOutISO){ alert('出勤・退勤時刻を入力してください'); return; }
    onSave({
      employeeId: employeeId,
      date: date,
      clockIn: clockInISO,
      clockOut: clockOutISO,
      breakMinutes: parseInt(breakMin||'0',10),
      breaks: [],
      note: note.trim(),
      correctionReason: reason.trim()
    });
  }

  return (
    <div className="modal-backdrop" onClick={function(e){ if(e.target.className==='modal-backdrop') onCancel(); }}>
      <div className="modal">
        <h2>{editRecord ? '記録を訂正' : '過去分を入力'}</h2>
        <div className="modal-sub">訂正理由の入力が必須です</div>

        <div className="field">
          <label>社員</label>
          <select className="select" value={employeeId} onChange={function(e){ setEmployeeId(e.target.value); }} disabled={!!editRecord}>
            {employees.map(function(emp){
              return <option key={emp.id} value={emp.id}>{emp.name}</option>;
            })}
          </select>
        </div>

        <div className="field">
          <label>日付</label>
          <input type="date" className="input" value={date} onChange={function(e){ setDate(e.target.value); }} />
        </div>

        <div className="row2">
          <div className="field">
            <label>出勤時刻</label>
            <input type="time" className="input" value={clockInT} onChange={function(e){ setClockInT(e.target.value); }} />
          </div>
          <div className="field">
            <label>退勤時刻</label>
            <input type="time" className="input" value={clockOutT} onChange={function(e){ setClockOutT(e.target.value); }} />
          </div>
        </div>

        <div className="field">
          <label>休憩(分)</label>
          <input type="number" inputMode="numeric" className="input" value={breakMin}
            onChange={function(e){ setBreakMin(e.target.value.replace(/[^0-9]/g,'')); }} />
        </div>

        <div className="field">
          <label>備考</label>
          <input className="input" placeholder="任意" value={note} onChange={function(e){ setNote(e.target.value); }} />
        </div>

        <div className="field">
          <label style={{color:'#dc2626'}}>訂正理由・補足 <span className="req">*</span></label>
          <textarea className="textarea" placeholder="例：打刻忘れのため上長承認済み" value={reason}
            onChange={function(e){ setReason(e.target.value); }} />
        </div>

        <div className="btn-row">
          <button className="btn" onClick={save}>保存する</button>
          <button className="btn outline" onClick={onCancel}>キャンセル</button>
        </div>
      </div>
    </div>
  );
}

function HistoryScreen({ state, dispatch }){
  const [filterEmp, setFilterEmp] = useState('all');
  const [showPastEntry, setShowPastEntry] = useState(false);
  const [editRecord, setEditRecord] = useState(null);

  const filtered = state.records
    .filter(function(r){ return filterEmp==='all' || r.employeeId===filterEmp; })
    .sort(function(a,b){
      if(a.date !== b.date) return b.date.localeCompare(a.date);
      return (b.clockIn||'').localeCompare(a.clockIn||'');
    });

  function openPastEntry(rec){
    setEditRecord(rec || null);
    setShowPastEntry(true);
  }
  function savePastEntry(data){
    if(editRecord){
      dispatch({ type:'UPDATE_RECORD', record:Object.assign({}, editRecord, data, { isEdited:true }) });
    } else {
      dispatch({ type:'ADD_RECORD', record:Object.assign({ id:genId(), breaks:[], isEdited:true }, data) });
    }
    setShowPastEntry(false);
    setEditRecord(null);
  }
  function deleteRecord(id){
    if(confirm('この記録を削除しますか?')){
      dispatch({ type:'DELETE_RECORD', id:id });
    }
  }

  return (
    <div className="screen">
      <div className="filter-row">
        <select className="select" value={filterEmp} onChange={function(e){ setFilterEmp(e.target.value); }}>
          <option value="all">全社員</option>
          {state.employees.map(function(emp){
            return <option key={emp.id} value={emp.id}>{emp.name}</option>;
          })}
        </select>
        <button className="btn outline" style={{margin:0,width:'auto'}}
          onClick={function(){ openPastEntry(null); }}
          disabled={state.employees.length===0}>過去入力</button>
      </div>

      {filtered.length === 0 ? <div className="empty">打刻履歴がありません</div> : null}

      {filtered.map(function(r){
        const emp = state.employees.find(function(e){ return e.id===r.employeeId; });
        const mins = calcWorkMinutes(r);
        return (
          <div key={r.id} className="hist-card">
            <div className="hist-head">
              <div className="emp-avatar" style={{width:38,height:38,fontSize:13}}>{emp ? getInitials(emp.name) : '?'}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:700,fontSize:15}}>{emp ? emp.name : '(削除済)'}</div>
                <div style={{fontSize:12,color:'#64748b'}}>
                  {dateJP(r.date)} {r.isEdited ? <span style={{color:'#c2410c',fontWeight:600,marginLeft:4}}>訂正済</span> : null}
                </div>
              </div>
              <div className="right">
                <span className={'pill '+(mins>0?'green':'gray')}>{minutesToHM(mins)}</span>
                <button className="btn small outline" onClick={function(){ openPastEntry(r); }}>訂正</button>
              </div>
            </div>
            <div className="times">
              <div className="col">
                <div className="lbl">出勤</div>
                <div className="val">{formatTime(r.clockIn)}</div>
              </div>
              <div className="col">
                <div className="lbl">退勤</div>
                <div className="val">{formatTime(r.clockOut)}</div>
              </div>
              <div className="col">
                <div className="lbl">休憩</div>
                <div className="val">{minutesToHM(calcBreakMin(r))}</div>
              </div>
            </div>
            {r.isEdited && r.correctionReason ? (
              <div className="correction">訂正理由: {r.correctionReason}</div>
            ) : null}
            {r.note ? (
              <div style={{marginTop:6,fontSize:12,color:'#64748b'}}>備考: {r.note}</div>
            ) : null}
            <div style={{marginTop:10,textAlign:'right'}}>
              <button className="btn small outline danger" onClick={function(){ deleteRecord(r.id); }}>削除</button>
            </div>
          </div>
        );
      })}

      {showPastEntry ? (
        <PastEntryModal employees={state.employees} editRecord={editRecord}
          onSave={savePastEntry}
          onCancel={function(){ setShowPastEntry(false); setEditRecord(null); }} />
      ) : null}
    </div>
  );
}

function MonthlyScreen({ state }){
  const [month, setMonth] = useState(formatMonth());
  const [empFilter, setEmpFilter] = useState('all');

  const rows = state.employees
    .filter(function(emp){ return empFilter==='all' || emp.id===empFilter; })
    .map(function(emp){
      const recs = state.records.filter(function(r){ return r.employeeId===emp.id && r.date.startsWith(month); });
      let totalMin = 0, workDays = 0;
      recs.forEach(function(r){
        const m = calcWorkMinutes(r);
        if(m>0){ totalMin += m; workDays++; }
      });
      return { emp:emp, totalMin:totalMin, workDays:workDays };
    });

  let totalDays = 0, totalMins = 0;
  rows.forEach(function(r){ totalDays += r.workDays; totalMins += r.totalMin; });

  return (
    <div className="screen">
      <div className="filter-row">
        <input type="month" className="input" style={{flex:1,margin:0}} value={month} onChange={function(e){ setMonth(e.target.value); }} />
        <select className="select" style={{flex:1,margin:0}} value={empFilter} onChange={function(e){ setEmpFilter(e.target.value); }}>
          <option value="all">全社員</option>
          {state.employees.map(function(emp){
            return <option key={emp.id} value={emp.id}>{emp.name}</option>;
          })}
        </select>
      </div>

      <div className="stat-grid">
        <div className="stat-card">
          <div className="lbl">出勤日数</div>
          <div className="val blue">{totalDays}</div>
          <div className="unit">日</div>
        </div>
        <div className="stat-card">
          <div className="lbl">合計勤務</div>
          <div className="val green">{minutesToHM(totalMins)}</div>
        </div>
      </div>

      {totalDays === 0 ? <div className="empty">この月のデータはありません</div> : null}

      {rows.filter(function(r){ return r.workDays>0; }).map(function(row){
        return (
          <div key={row.emp.id} className="card">
            <div className="emp-row">
              <div className="emp-avatar">{getInitials(row.emp.name)}</div>
              <div className="emp-info">
                <div className="name">{row.emp.name}</div>
                {row.emp.department ? <div className="sub">{row.emp.department}</div> : null}
              </div>
            </div>
            <div className="times" style={{marginTop:12}}>
              <div className="col">
                <div className="lbl">出勤日数</div>
                <div className="val">{row.workDays}日</div>
              </div>
              <div className="col">
                <div className="lbl">勤務時間</div>
                <div className="val">{minutesToHM(row.totalMin)}</div>
              </div>
              <div className="col">
                <div className="lbl">時間(10進)</div>
                <div className="val">{(row.totalMin/60).toFixed(2)}h</div>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function PayrollScreen({ state }){
  const [month, setMonth] = useState(formatMonth());

  const rows = state.employees.map(function(emp){
    const recs = state.records.filter(function(r){ return r.employeeId===emp.id && r.date.startsWith(month); });
    let totalMin = 0;
    recs.forEach(function(r){ totalMin += calcWorkMinutes(r); });
    const pay = calcPayroll(emp, totalMin);
    return { emp:emp, totalMin:totalMin, pay:pay };
  });

  return (
    <div className="screen">
      <div className="filter-row">
        <input type="month" className="input" style={{flex:1,margin:0}} value={month} onChange={function(e){ setMonth(e.target.value); }} />

      <div className="helper" style={{marginBottom:12}}>令和8年 月額表 甲欄(電算機計算特例) ／ 社保控除0 として計算</div>

      {rows.length === 0 ? <div className="empty">社員未登録</div> : null}

          <div key={row.emp.id} className="card">

              <div className="emp-info">

                </div>
              </div>
            </div>
            <table className="pay-table">
              <tbody>
                <tr>
                  <td>勤務時間</td>
                  <td className="num">{minutesToHM(row.totalMin)}({row.pay.hours.toFixed(2)}h)</td>

                  <td className="num">-¥{row.pay.tax.toLocaleString()}</td>
                </tr>
                <tr className="total">
                  <td>差引手取り</td>
                  <td className="num">¥{row.pay.net.toLocaleString()}</td>
                </tr>
              </tbody>
            </table>
          </div>

  );
}

function EmployeesScreen({ state, dispatch }){
  const [name, setName] = useState('');
  const [department, setDepartment] = useState('');
  const [baseSalary, setBaseSalary] = useState('');
  const [hourlyRate, setHourlyRate] = useState('');
  const [dependents, setDependents] = useState('0');
  const [editId, setEditId] = useState(null);

  function reset(){
    setName(''); setDepartment(''); setBaseSalary(''); setHourlyRate(''); setDependents('0'); setEditId(null);
  }

  function save(){
    if(!name.trim()){ alert('名前を入力してください'); return; }
    const base = parseInt(baseSalary||'0',10);
    const hourly = parseInt(hourlyRate||'0',10);
    if(base<=0 && hourly<=0){ alert('基本給か時給のどちらか一方を入力してください'); return; }
    if(base>0 && hourly>0){ alert('基本給と時給は片方だけ入力してください'); return; }

    const empData = {
      name: name.trim(),
      department: department.trim(),
      baseSalary: base,
      hourlyRate: hourly,
      dependents: parseInt(dependents,10) || 0
    };

    if(editId){
      const existing = state.employees.find(function(e){ return e.id===editId; });
      dispatch({ type:'UPDATE_EMPLOYEE', employee:Object.assign({}, existing, empData) });
    } else {
      dispatch({ type:'ADD_EMPLOYEE', employee:Object.assign({ id:genId(), createdAt:nowISO() }, empData) });
    }
    reset();
  }

  function startEdit(emp){
    setEditId(emp.id);
    setName(emp.name);
    setDepartment(emp.department||'');
    setBaseSalary(emp.baseSalary ? String(emp.baseSalary) : '');
    setHourlyRate(emp.hourlyRate ? String(emp.hourlyRate) : '');
    setDependents(String(emp.dependents||0));
    window.scrollTo({top:0,behavior:'smooth'});
  }

  function deleteEmp(emp){
    if(confirm(emp.name+' を削除しますか?(関連する打刻記録も全て削除されます)')){
      dispatch({ type:'DELETE_EMPLOYEE', id:emp.id });
      if(editId===emp.id) reset();
    }
  }

  return (
    <div className="screen">
      <div className="card">
        <h2 style={{margin:'0 0 14px',fontSize:17}}>{editId ? '社員を編集' : '社員を追加'}</h2>

        <div className="row2">
          <div className="field">
            <label>名前 <span className="req">*</span></label>
            <input className="input" placeholder="山田 太郎" value={name} onChange={function(e){ setName(e.target.value); }} />
          </div>
          <div className="field">
            <label>部署・役職</label>
            <input className="input" placeholder="営業部" value={department} onChange={function(e){ setDepartment(e.target.value); }} />
          </div>
        </div>

        <div className="row2">
          <div className="field">
            <label>基本給(円)</label>
            <input className="input" inputMode="numeric" placeholder="月給制の場合"
              value={baseSalary} onChange={function(e){ setBaseSalary(e.target.value.replace(/[^0-9]/g,'')); }} />
          </div>
          <div className="field">
            <label>時給(円)</label>
            <input className="input" inputMode="numeric" placeholder="時給制の場合"
              value={hourlyRate} onChange={function(e){ setHourlyRate(e.target.value.replace(/[^0-9]/g,'')); }} />
          </div>
        </div>

        <div className="helper">基本給か時給のどちらか一方を入力してください</div>

        <div className="field" style={{marginTop:12}}>
          <label>扶養人数</label>
          <select className="select" value={dependents} onChange={function(e){ setDependents(e.target.value); }}>
            <option value="0">0人(なし)</option>
            <option value="1">1人</option>
            <option value="2">2人</option>
            <option value="3">3人</option>
            <option value="4">4人</option>
            <option value="5">5人</option>
            <option value="6">6人</option>
            <option value="7">7人</option>
          </select>
        </div>

        {editId ? (
          <div className="btn-row">
            <button className="btn" onClick={save}>更新する</button>
            <button className="btn outline" onClick={reset}>キャンセル</button>
          </div>
        ) : (
          <button className="btn" onClick={save}>追加する</button>
        )}
      </div>

      {state.employees.length === 0 ? <div className="empty">まだ社員が登録されていません</div> : null}

      {state.employees.map(function(emp){
        return (
          <div key={emp.id} className="card">
            <div className="emp-row">
              <div className="emp-avatar">{getInitials(emp.name)}</div>
              <div className="emp-info">
                <div className="name">{emp.name}</div>
                {emp.department ? <div className="sub">{emp.department}</div> : null}
              </div>
              <div className="emp-actions">
                <button className="btn small outline" onClick={function(){ startEdit(emp); }}>編集</button>
                <button className="btn small outline danger" onClick={function(){ deleteEmp(emp); }}>削除</button>
              </div>
            </div>
            <div style={{marginTop:10,fontSize:13,color:'#475569'}}>
              基本給 <strong>¥{(emp.baseSalary||0).toLocaleString()}</strong>　
              時給 <strong>¥{(emp.hourlyRate||0).toLocaleString()}</strong>　
              扶養 <strong>{emp.dependents||0}人</strong>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function App(){
  const [state, setState] = useState(INITIAL_STATE);
  const [loaded, setLoaded] = useState(false);
  const [tab, setTab] = useState('punch');
  const [isAdmin, setIsAdmin] = useState(false);

  useEffect(function(){
    const unsub = DOC_REF.onSnapshot(function(snap){
      if(snap.exists){
        const data = snap.data();
        if(data && data.payload){
          setState(Object.assign({}, INITIAL_STATE, data.payload));
        }
      } else {
        DOC_REF.set({ payload:INITIAL_STATE, updatedAt:nowISO() });
      }
      setLoaded(true);
    }, function(err){
      throw new Error('Firestore subscribe error: '+err.message);
    });
    return function(){ unsub(); };
  }, []);

  useEffect(function(){
    if(loaded){
      const ls = document.getElementById('loading-screen');
      if(ls) ls.style.display = 'none';
    }
  }, [loaded]);

  const dispatch = useCallback(function(action){
    setState(function(prev){
      const next = reducer(prev, action);
      DOC_REF.set({ payload:next, updatedAt:nowISO() }).catch(function(err){
        console.error('Firestore write error:', err);
        alert('保存に失敗しました：'+err.message);
      });
      return next;
    });
  }, []);

  const protectedTabs = ['history','monthly','payroll','employees'];
  const needsLock = protectedTabs.indexOf(tab) >= 0 && !isAdmin;

  let screen = null;
  if(needsLock){
    screen = <LockScreen onUnlock={function(){ setIsAdmin(true); }} />;
  } else if(tab === 'punch')          screen = <PunchScreen state={state} dispatch={dispatch} />;
  else if(tab === 'history')          screen = <HistoryScreen state={state} dispatch={dispatch} />;
  else if(tab === 'monthly')          screen = <MonthlyScreen state={state} />;
  else if(tab === 'payroll')          screen = <PayrollScreen state={state} />;
  else if(tab === 'employees')        screen = <EmployeesScreen state={state} dispatch={dispatch} />;

  return (
    <React.Fragment>
      <Header employeeCount={state.employees.length} />
      <TabNav tab={tab} onChange={setTab} isAdmin={isAdmin} />
      {screen}
    </React.Fragment>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
